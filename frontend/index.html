<!DOCTYPE html>
<html>
<head>
<title>TruthLens Times</title>

<style>
body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: #f5f5f5;
    color: #111;
}

/* TOP STRIP */
.top-strip {
    background:#000;
    color:#fff;
    font-size:12px;
    padding:5px 10px;
    display:flex;
    justify-content:space-between;
}

/* HEADER */
.header {
    text-align:center;
    font-size:42px;
    font-weight:bold;
    padding:10px;
    background:white;
    border-bottom:2px solid #ccc;
}

/* NAV */
.nav {
    display:flex;
    justify-content:center;
    gap:20px;
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
    flex-wrap:wrap;
}

.nav span {
    cursor:pointer;
    font-weight:bold;
}

/* BREAKING */
.breaking {
    background:#bb1919;
    color:white;
    padding:8px;
    overflow:hidden;
}

.breaking span {
    display:inline-block;
    white-space:nowrap;
    animation:scroll 120s linear infinite;
}

@keyframes scroll {
    0% { transform:translateX(100%); }
    100% { transform:translateX(-100%); }
}

/* SEARCH */
.search-box {
    text-align:center;
    padding:10px;
}

/* LAYOUT */
.container {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    padding:20px;
}

/* HERO */
.hero img {
    width:100%;
    height:400px;
    object-fit:cover;
}

.hero h2 {
    font-size:30px;
}

/* SIDE */
.side div {
    display:flex;
    gap:10px;
    margin-bottom:10px;
    cursor:pointer;
}

/* SECTION */
.section {
    padding:20px;
    background:white;
    margin:10px;
}

.section h2 {
    border-bottom:2px solid #000;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

/* CARD */
.card {
    cursor:pointer;
    border-bottom:1px solid #ccc;
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.modal-content {
    background:white;
    margin:10% auto;
    padding:20px;
    width:60%;
}

/* ARTICLE VIEW */
.article-view {
    padding:20px;
}

.hidden { display:none; }

button { cursor:pointer; margin-top:5px; }

</style>
</head>

<body>

<div class="top-strip">
<span>Delhi Edition</span>
<span id="time"></span>
</div>

<div class="header">TruthLens Times</div>

<div class="nav">
<span onclick="showHome()">Home</span>
<span onclick="showSaved()">Saved</span>
<span onclick="filterCategory('Politics')">Politics</span>
<span onclick="filterCategory('Technology')">Technology</span>
<span onclick="filterCategory('Sports')">Sports</span>
<span onclick="filterCategory('Business')">Business</span>
</div>

<div class="search-box">
<input id="search" placeholder="Search news..." style="padding:8px; width:50%;">
</div>

<div class="breaking">
<span id="ticker"></span>
</div>

<!-- HOME -->
<div id="homePage">

<div class="container">
<div id="hero" class="hero"></div>
<div id="side" class="side"></div>
</div>

<div class="section">
<h2>⭐ Verified News</h2>
<div id="verified" class="grid"></div>
</div>

<div id="sections"></div>

</div>

<!-- ARTICLE PAGE -->
<div id="articlePage" class="hidden article-view"></div>

<!-- SAVED -->
<div id="savedPage" class="hidden section">
<h2>Saved Articles</h2>
<div id="savedNews" class="grid"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span onclick="closeModal()">✖</span>
<h3>Sources</h3>
<div id="modalContent"></div>
</div>
</div>

<script>

let fullData=[];
let page=0;

/* TIME */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleString();
},1000);

/* NAV */
function showHome(){
hideAll();
document.getElementById("homePage").classList.remove("hidden");
}

function showSaved(){
hideAll();
document.getElementById("savedPage").classList.remove("hidden");
loadSaved();
}

function hideAll(){
document.getElementById("homePage").classList.add("hidden");
document.getElementById("savedPage").classList.add("hidden");
document.getElementById("articlePage").classList.add("hidden");
}

/* ⭐ TOI STYLE ARTICLE PAGE */
function openArticleView(n){

hideAll();
document.getElementById("articlePage").classList.remove("hidden");

let related = fullData
    .filter(x => x.category === n.category && x.id !== n.id)
    .slice(0,5);

document.getElementById("articlePage").innerHTML = `

<div style="max-width:1100px; margin:auto; display:grid; grid-template-columns:2fr 1fr; gap:30px;">

<div>

<h1 style="font-size:34px;">${n.title}</h1>

<p style="color:gray;">${n.source || "TruthLens"} | ${new Date().toLocaleString()}</p>

<p style="font-weight:bold; color:${
n.credibility_score>=75 ? 'green' :
n.credibility_score>=50 ? 'orange' : 'red'
}">
🧠 ${n.status} (${n.credibility_score}%)
</p>

<img src="${n.image}" style="width:100%; height:400px; object-fit:cover; margin:15px 0;">

<p style="font-size:18px; line-height:1.8;">
${n.description}
</p>

<p style="font-size:18px; line-height:1.8;">
${n.description} ${n.description}
</p>

<button onclick="openModal(${JSON.stringify(n.matched_titles)}, event)">
🔍 View Sources
</button>

<button onclick="saveArticle(${JSON.stringify(n)})">
💾 Save Article
</button>

<br><br>
<button onclick="showHome()">⬅ Back</button>

</div>

<div>
<h3 style="border-bottom:2px solid black;">More News</h3>

${related.map(r=>`
<div style="display:flex; gap:10px; margin-bottom:15px; cursor:pointer;"
onclick='openArticleView(${JSON.stringify(r)})'>
<img src="${r.image}" style="width:90px; height:70px; object-fit:cover;">
<p>${r.title}</p>
</div>
`).join("")}

</div>

</div>
`;
}

/* MODAL */
function openModal(s,e){
e.stopPropagation();
modalContent.innerHTML=s.map(x=>`<p>${x}</p>`).join("");
modal.style.display="block";
}
function closeModal(){ modal.style.display="none"; }

/* SAVE */
function saveArticle(a){
let s=JSON.parse(localStorage.getItem("savedNews"))||[];
s.push(a);
localStorage.setItem("savedNews",JSON.stringify(s));
alert("Saved");
}

function deleteSaved(i){
let s=JSON.parse(localStorage.getItem("savedNews"))||[];
s.splice(i,1);
localStorage.setItem("savedNews",JSON.stringify(s));
loadSaved();
}

function loadSaved(){
let s=JSON.parse(localStorage.getItem("savedNews"))||[];
savedNews.innerHTML=s.map((n,i)=>`
<div class="card">
<img src="${n.image}">
<h3>${n.title}</h3>
<button onclick='openArticleView(${JSON.stringify(n)})'>Open</button>
<button onclick="deleteSaved(${i})">Delete</button>
</div>`).join("");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
let val=this.value.toLowerCase();
let filtered=fullData.filter(n =>
n.title.toLowerCase().includes(val)
);
renderFiltered(filtered);
});

function filterCategory(cat){
let filtered=fullData.filter(n=>n.category===cat);
renderFiltered(filtered);
}

function renderFiltered(data){
document.getElementById("sections").innerHTML="";
render(data);
}

/* LOAD */
async function loadNews(){
let res=await fetch("http://127.0.0.1:8000/news");
let data=await res.json();
fullData=data;

hero.innerHTML=`<img src="${data[0].image}"><h2>${data[0].title}</h2>`;

side.innerHTML=data.slice(1,6).map(n=>`
<div onclick='openArticleView(${JSON.stringify(n)})'>
<img src="${n.image}" style="width:80px;height:60px;">
<p>${n.title}</p>
</div>`).join("");

verified.innerHTML=data.filter(n=>n.credibility_score>=75)
.slice(0,6)
.map(card).join("");

ticker.innerText=data.map(n=>n.title).join(" 🔴 ");

render(data.slice(0,10));
}

/* CARD */
function card(n){
return `<div class="card" onclick='openArticleView(${JSON.stringify(n)})'>

<img src="${n.image}">

<h3>${n.title}</h3>

<p style="font-weight:bold; color:${
n.credibility_score>=75 ? 'green' :
n.credibility_score>=50 ? 'orange' : 'red'
}">
 ${n.status} (${n.credibility_score}%)
</p>

<p id="desc-${n.id}">
${n.description.slice(0,100)}...
</p>

<button onclick="expand('${n.id}', \`${n.description}\`, event)">Read More</button>

<button onclick="openModal(${JSON.stringify(n.matched_titles)},event)">Sources</button>

<button onclick="saveArticle(${JSON.stringify(n)});event.stopPropagation();">Save</button>

</div>`;
}

/* EXPAND */
function expand(id, text, e){
e.stopPropagation();
document.getElementById("desc-"+id).innerText=text;
}

/* RENDER */
function render(data){
const sections=document.getElementById("sections");

let grouped={};
data.forEach(n=>{
if(!grouped[n.category]) grouped[n.category]=[];
grouped[n.category].push(n);
});

Object.keys(grouped).forEach(cat=>{
sections.innerHTML+=`
<div class="section">
<h2>${cat}</h2>
<div class="grid">${grouped[cat].map(card).join("")}</div>
</div>`;
});
}

/* SCROLL */
window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
page++;
render(fullData.slice(page*10,(page+1)*10));
}
});

loadNews();

</script>

</body>
</html>
