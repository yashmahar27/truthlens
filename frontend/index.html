<!DOCTYPE html>
<html>
<head>
<title>TruthLens AI News</title>

<style>
body { margin:0; font-family:Georgia, serif; background:#f5f5f5; }

/* HEADER */
.header {
    background:#bb1919;
    color:white;
    padding:15px;
    font-size:28px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:1000;
    font-weight:bold;
    letter-spacing:1px;
}

/* SECTION */
.section { padding:20px; }

.section h2 {
    border-bottom:2px solid #bb1919;
    padding-bottom:5px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

/* CARD */
.card {
    border:1px solid #ddd;
    padding:10px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.02);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

/* HERO */
.hero img {
    width:100%;
    height:350px;
    object-fit:cover;
}

/* COLORS */
.verified { color:green; font-weight:bold; }
.medium { color:orange; font-weight:bold; }
.low { color:red; font-weight:bold; }

.reason { font-size:12px; color:gray; }

/* BUTTON */
button {
    margin-top:5px;
    cursor:pointer;
    background:#bb1919;
    color:white;
    border:none;
    padding:5px 10px;
}

/* TRENDING */
#trending span {
    margin-right:10px;
    font-weight:bold;
}

/* LOADER */
.loader {
    text-align:center;
    font-size:20px;
    padding:50px;
}
</style>
</head>

<body>

<div class="header">📰 TruthLens AI Newspaper</div>

<div id="hero" class="section hero"></div>

<div class="section">
<h2>⭐ Verified News</h2>
<div id="verified" class="grid"></div>
</div>

<div class="section">
<h2>📈 Trending</h2>
<div id="trending"></div>
</div>

<div id="sections"></div>

<div id="loading" class="loader">Loading news...</div>

<script>

let fullData = [];
let page = 0;

function getColor(status){
    if(status==="Verified") return "verified";
    if(status==="Medium Trust") return "medium";
    return "low";
}

function openArticle(url){
    window.open(url,"_blank");
}

function toggleSources(id, event){
    event.stopPropagation();
    const el = document.getElementById("sources-"+id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

// ✅ FIXED MAIN FUNCTION
async function loadNews(){

    try {
        const res = await fetch("https://truthlens-backend-12tt.onrender.com/news");
        const data = await res.json();

        console.log("DATA:", data);

        document.getElementById("loading").style.display = "none";

        if (!Array.isArray(data) || data.length === 0){
            document.body.innerHTML = "<h2 style='text-align:center;'>⚠️ No news available</h2>";
            return;
        }

        fullData = data;

        // HERO
        const main = data[0];

        document.getElementById("hero").innerHTML = `
            <img src="${main.image || 'https://picsum.photos/800/400'}">
            <h2>${main.title}</h2>
            <p>${main.description || ''}</p>
        `;

        // VERIFIED
        const verified = data.filter(n => n.status === "Verified");

        document.getElementById("verified").innerHTML =
            verified.slice(0,6).map(cardHTML).join("");

        // TRENDING
        const wordCount = {};
        data.forEach(n=>{
            n.title.split(" ").forEach(word=>{
                word = word.toLowerCase();
                if(word.length > 4){
                    wordCount[word] = (wordCount[word] || 0) + 1;
                }
            });
        });

        document.getElementById("trending").innerHTML =
            Object.entries(wordCount)
            .sort((a,b)=>b[1]-a[1])
            .slice(0,10)
            .map(t=>`<span>#${t[0]}</span>`)
            .join("");

        renderNews(data.slice(0,10));

    } catch(err){
        console.error(err);
        document.body.innerHTML = "<h2 style='text-align:center;'>⚠️ Failed to load news</h2>";
    }
}

// CARD
function cardHTML(n){
return `
<div class="card" onclick="openArticle('${n.url}')">

<img src="${n.image || 'https://picsum.photos/400'}">

<h3>${n.title}</h3>

<p class="${getColor(n.status)}">
🧠 ${n.status} (${n.credibility_score}%)
</p>

<p class="reason">${n.reason}</p>

<button onclick="toggleSources('${n.id}', event); return false;">
Show Sources
</button>

<div id="sources-${n.id}" style="display:none; font-size:12px; color:gray;">
${(n.matched_titles || []).map(t => `<p>📰 ${t}</p>`).join("")}
</div>

</div>
`;
}

// RENDER
function renderNews(data){

    const sections = document.getElementById("sections");

    const grouped = {};

    data.forEach(n=>{
        if(!grouped[n.category]) grouped[n.category] = [];
        grouped[n.category].push(n);
    });

    Object.keys(grouped).forEach(cat=>{

        sections.innerHTML += `
        <div class="section">
            <h2>${cat}</h2>
            <div class="grid">
                ${grouped[cat].map(cardHTML).join("")}
            </div>
        </div>
        `;
    });
}

// INFINITE SCROLL
window.addEventListener("scroll", () => {

    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){

        page++;

        const next = fullData.slice(page*10, (page+1)*10);

        if(next.length){
            renderNews(next);
        }
    }

});

// START
loadNews();

</script>

</body>
</html>
