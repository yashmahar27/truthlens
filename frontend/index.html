<!DOCTYPE html>
<html>
<head>
<title>TruthLens AI News</title>

<style>
body { margin:0; font-family:Georgia; background:#f6f6f6; }

.header {
    background:#bb1919;
    color:white;
    padding:18px;
    font-size:30px;
    text-align:center;
    position:sticky;
    top:0;
}

.navbar {
    display:flex;
    gap:20px;
    padding:10px;
    background:white;
    overflow:auto;
}

.section { margin:20px; }

.section h2 {
    border-left:6px solid #bb1919;
    padding-left:10px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card {
    background:white;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.verified { color:green; }
.medium { color:orange; }
.low { color:red; }

button {
    background:#bb1919;
    color:white;
    border:none;
    padding:5px 10px;
    margin:10px;
    cursor:pointer;
}

#trending span {
    background:white;
    padding:6px 10px;
    margin:5px;
    border-radius:20px;
    display:inline-block;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📰 TruthLens AI Newspaper</div>

<div class="navbar">
    <span onclick="filterCategory('All')">All</span>
    <span onclick="filterCategory('Politics')">Politics</span>
    <span onclick="filterCategory('Technology')">Technology</span>
    <span onclick="filterCategory('Sports')">Sports</span>
    <span onclick="filterCategory('Business')">Business</span>
</div>

<div id="hero" class="section"></div>

<div class="section">
<h2>⭐ Verified News</h2>
<div id="verified" class="grid"></div>
</div>

<div class="section">
<h2>📈 Trending</h2>
<div id="trending"></div>
</div>

<div id="sections"></div>

<script>

let fullData = [];
let page = 0;

/* CATEGORY FILTER */
function filterCategory(cat){
    document.getElementById("sections").innerHTML="";
    if(cat==="All"){
        renderNews(fullData.slice(0,10));
    } else {
        renderNews(fullData.filter(n=>n.category===cat));
    }
}

/* COLOR */
function getColor(status){
    if(status==="Verified") return "verified";
    if(status==="Medium Trust") return "medium";
    return "low";
}

/* OPEN */
function openArticle(url){
    window.open(url,"_blank");
}

/* SOURCES */
function toggleSources(id,e){
    e.stopPropagation();
    let el=document.getElementById("sources-"+id);
    el.style.display = el.style.display==="none"?"block":"none";
}

/* 🔥 ADVANCED TRENDING */
function generateTrending(data){

    const wordCount = {};

    const stopWords = [
        "the","and","for","with","this","that","from","have","has",
        "was","were","will","are","about","into","after","before",
        "their","they","them","said","says","you","your","over",
        "more","than","just","been","being","his","her","its"
    ];

    data.forEach(n => {
        n.title.toLowerCase().split(" ").forEach(word => {

            word = word.replace(/[^a-z]/g, "");

            if(word.length > 3 && !stopWords.includes(word)){
                wordCount[word] = (wordCount[word] || 0) + 1;
            }
        });
    });

    const trending = Object.entries(wordCount)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,10);

    document.getElementById("trending").innerHTML =
        trending.map(([word]) =>
            `<span onclick="filterTrending('${word}')">#${word}</span>`
        ).join("");
}

/* FILTER TRENDING */
function filterTrending(word){
    const filtered = fullData.filter(n =>
        n.title.toLowerCase().includes(word)
    );
    document.getElementById("sections").innerHTML="";
    renderNews(filtered);
}

/* LOAD NEWS */
async function loadNews(){

    const res = await fetch("https://truthlens-backend-12tt.onrender.com/news");
    const data = await res.json();

    if(!Array.isArray(data)) return;

    fullData = data;

    /* HERO */
    document.getElementById("hero").innerHTML = `
        <img src="${data[0].image}" style="width:100%;height:300px;object-fit:cover;">
        <h2>${data[0].title}</h2>
    `;

    /* VERIFIED */
    const verified = data
        .filter(n=>n.credibility_score>=70)
        .sort((a,b)=>b.credibility_score-a.credibility_score);

    document.getElementById("verified").innerHTML =
        verified.slice(0,6).map(card).join("");

    /* TRENDING */
    generateTrending(data);

    renderNews(data.slice(0,10));
}

/* CARD */
function card(n){
return `
<div class="card" onclick="openArticle('${n.url}')">
<img src="${n.image}">
<h3>${n.title}</h3>
<p class="${getColor(n.status)}">
${n.status} (${n.credibility_score}%)
</p>
<button onclick="toggleSources('${n.id}',event);return false;">
Sources
</button>
<div id="sources-${n.id}" style="display:none;font-size:12px;">
${(n.matched_titles||[]).map(t=>`<p>${t}</p>`).join("")}
</div>
</div>
`;
}

/* RENDER */
function renderNews(data){

    const sections=document.getElementById("sections");

    const grouped={};

    data.forEach(n=>{
        if(!grouped[n.category]) grouped[n.category]=[];
        grouped[n.category].push(n);
    });

    Object.keys(grouped).forEach(cat=>{
        sections.innerHTML+=`
        <div class="section">
            <h2>${cat}</h2>
            <div class="grid">
                ${grouped[cat].map(card).join("")}
            </div>
        </div>`;
    });
}

/* SCROLL */
window.addEventListener("scroll",()=>{
    if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
        page++;
        const next=fullData.slice(page*10,(page+1)*10);
        if(next.length) renderNews(next);
    }
});

loadNews();

</script>

</body>
</html>
